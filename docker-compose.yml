x-airflow-common: &airflow-common
  build:
    context: .
    dockerfile: Dockerfile.airflow
  env_file:
    - ${ENV_FILE_PATH:-.env}
  environment: &airflow-common-env
    AIRFLOW__CORE__EXECUTOR: CeleryExecutor
    AIRFLOW__CORE__AUTH_MANAGER: airflow.providers.fab.auth_manager.fab_auth_manager.FabAuthManager
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: ${AIRFLOW__DATABASE__SQL_ALCHEMY_CONN}
    AIRFLOW__CELERY__RESULT_BACKEND: ${AIRFLOW__CELERY__RESULT_BACKEND}
    AIRFLOW__CELERY__BROKER_URL: ${AIRFLOW__CELERY__BROKER_URL}
    AIRFLOW__CORE__FERNET_KEY: ${FERNET_KEY}
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "true"
    AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    AIRFLOW__CORE__EXECUTION_API_SERVER_URL: "http://airflow-apiserver:8080/execution/"
    AIRFLOW__API_AUTH__JWT_SECRET: ${AIRFLOW__API_AUTH__JWT_SECRET:-airflow_jwt_secret}
    AIRFLOW__API_AUTH__JWT_ISSUER: ${AIRFLOW__API_AUTH__JWT_ISSUER:-airflow}
    AIRFLOW__SCHEDULER__ENABLE_HEALTH_CHECK: "true"
    _PIP_ADDITIONAL_REQUIREMENTS: ${_PIP_ADDITIONAL_REQUIREMENTS:-}
    AIRFLOW_CONFIG: "/opt/airflow/config/airflow.cfg"
    # Lakehouse connection used by DAGs (separate from Airflow metadata conn)
    AIRFLOW_CONN_LAKEHOUSE_POSTGRES: ${AIRFLOW_CONN_LAKEHOUSE_POSTGRES}
  volumes:
    - ${AIRFLOW_PROJ_DIR:-.}/dags:/opt/airflow/dags
    - ${AIRFLOW_PROJ_DIR:-.}/logs:/opt/airflow/logs
    - ${AIRFLOW_PROJ_DIR:-.}/config:/opt/airflow/config
    - ${AIRFLOW_PROJ_DIR:-.}/plugins:/opt/airflow/plugins
    - ${AIRFLOW_PROJ_DIR:-.}/dbt:/opt/airflow/dbt
    - ${AIRFLOW_PROJ_DIR:-.}/reports:/reports
  user: "${AIRFLOW_UID:-50000}:0"
  depends_on: &airflow-common-depends-on
    redis:
      condition: service_healthy
    postgres-central:
      condition: service_healthy
  networks:
    - multi-subsidary-net

# =============================================================================
services:
  # ---------------------------------------------------------------------------
  # INSTANCE 1 — postgres-dept
  # Hosts all 24 dept_* databases (OLTP source for Debezium CDC)
  # WAL level forced to logical via POSTGRES_INITDB_ARGS
  # Network: lakehouse-net only (dept containers + kafka-connect)
  # ---------------------------------------------------------------------------
  postgres-dept:
    image: postgres:16
    container_name: postgres-dept
    environment:
      POSTGRES_USER: ${POSTGRES_DEPT_USER}
      POSTGRES_PASSWORD: ${POSTGRES_DEPT_PASSWORD}
      POSTGRES_DB: postgres
      # Force WAL level to logical at init — required for Debezium CDC
      POSTGRES_INITDB_ARGS: "--wal-level=logical"
    command: >
      postgres
        -c wal_level=logical
        -c max_replication_slots=30
        -c max_wal_senders=30
    ports:
      - "5433:5432"
    volumes:
      - postgres-dept-volume:/var/lib/postgresql/data
      - ./init-scripts/dept:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "${POSTGRES_DEPT_USER}"]
      interval: 5s
      timeout: 10s
      retries: 10
      start_period: 10s
    restart: always
    networks:
      - lakehouse-net

  # ---------------------------------------------------------------------------
  # INSTANCE 2 — postgres-central
  # Hosts: lakehouse (bronze/silver/gold) + airflow + superset + datahub
  # Network: multi-subsidary-net (all platform services)
  # ---------------------------------------------------------------------------
  postgres-central:
    image: postgres:16
    container_name: postgres-central
    environment:
      POSTGRES_USER: ${POSTGRES_CENTRAL_USER}
      POSTGRES_PASSWORD: ${POSTGRES_CENTRAL_PASSWORD}
      # Primary DB created on container init
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - postgres-central-volume:/var/lib/postgresql/data
      - ./init-scripts/central:/docker-entrypoint-initdb.d
    healthcheck:
      test:
        [
          "CMD",
          "pg_isready",
          "-U",
          "${POSTGRES_CENTRAL_USER}",
          "-d",
          "${POSTGRES_DB}",
        ]
      interval: 5s
      timeout: 10s
      retries: 10
      start_period: 10s
    restart: always
    networks:
      - multi-subsidary-net

  # ---------------------------------------------------------------------------
  # PGADMIN — connects to both instances
  # ---------------------------------------------------------------------------
  pgadmin:
    image: dpage/pgadmin4
    container_name: pgadmin
    restart: always
    ports:
      - "5050:80"
    volumes:
      - ./config/pgadmin/servers.json:/pgadmin4/servers.json
      - ./config/pgadmin/pgpass:/pgpass
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD}
    depends_on:
      postgres-central:
        condition: service_healthy
      postgres-dept:
        condition: service_healthy
    networks:
      - multi-subsidary-net
      - lakehouse-net

  # ---------------------------------------------------------------------------
  # REDIS — Celery broker for Airflow workers
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7.2-bookworm
    container_name: redis
    expose:
      - 6379
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 30s
      retries: 50
      start_period: 30s
    restart: always
    networks:
      - multi-subsidary-net

  # ---------------------------------------------------------------------------
  # AIRFLOW — metadata on postgres-central/airflow
  #           DAG lakehouse queries via AIRFLOW_CONN_LAKEHOUSE_POSTGRES
  # ---------------------------------------------------------------------------
  airflow-apiserver:
    <<: *airflow-common
    command: >
      bash -c "
        python /opt/airflow/config/setup_conn.py &&
        airflow api-server
      "
    ports:
      - "8080:8080"
    healthcheck:
      test:
        ["CMD", "curl", "--fail", "http://localhost:8080/api/v2/monitor/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: always
    depends_on:
      <<: *airflow-common-depends-on
      airflow-init:
        condition: service_completed_successfully

  airflow-scheduler:
    <<: *airflow-common
    command: scheduler
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8974/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: always
    depends_on:
      <<: *airflow-common-depends-on
      airflow-init:
        condition: service_completed_successfully

  airflow-dag-processor:
    <<: *airflow-common
    command: dag-processor
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'airflow jobs check --job-type DagProcessorJob --hostname "$${HOSTNAME}"',
        ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: always
    depends_on:
      <<: *airflow-common-depends-on
      airflow-init:
        condition: service_completed_successfully

  airflow-worker:
    <<: *airflow-common
    command: celery worker
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'celery --app airflow.providers.celery.executors.celery_executor.app inspect ping -d "celery@$${HOSTNAME}"',
        ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    environment:
      <<: *airflow-common-env
      DUMB_INIT_SETSID: "0"
    restart: always
    depends_on:
      <<: *airflow-common-depends-on
      airflow-apiserver:
        condition: service_healthy
      airflow-init:
        condition: service_completed_successfully

  airflow-triggerer:
    <<: *airflow-common
    command: triggerer
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'airflow jobs check --job-type TriggererJob --hostname "$${HOSTNAME}"',
        ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: always
    depends_on:
      <<: *airflow-common-depends-on
      airflow-init:
        condition: service_completed_successfully

  airflow-init:
    <<: *airflow-common
    entrypoint: /bin/bash
    command:
      - -c
      - |
        echo "postgres-central is ready"
        if [[ -z "${AIRFLOW_UID}" ]]; then
          echo "WARNING: AIRFLOW_UID not set"
          export AIRFLOW_UID=$$(id -u)
        fi
        mkdir -v -p /opt/airflow/{logs,dags,plugins,config}
        mkdir -v -p /reports
        chown -R "${AIRFLOW_UID}:0" /reports
        chmod -R 775 /reports
        /entrypoint airflow version
        /entrypoint airflow config list >/dev/null
        chown -R "${AIRFLOW_UID}:0" /opt/airflow/
        chown -v -R "${AIRFLOW_UID}:0" /opt/airflow/{logs,dags,plugins,config}
    environment:
      <<: *airflow-common-env
      _AIRFLOW_DB_MIGRATE: "true"
      _AIRFLOW_WWW_USER_CREATE: "true"
      _AIRFLOW_WWW_USER_USERNAME: ${_AIRFLOW_WWW_USER_USERNAME:-airflow}
      _AIRFLOW_WWW_USER_PASSWORD: ${_AIRFLOW_WWW_USER_PASSWORD:-airflow}
      _PIP_ADDITIONAL_REQUIREMENTS: ""
    user: "0:0"

  airflow-cli:
    <<: *airflow-common
    profiles:
      - debug
    environment:
      <<: *airflow-common-env
      CONNECTION_CHECK_MAX_COUNT: "0"
    command:
      - bash
      - -c
      - airflow
    depends_on:
      <<: *airflow-common-depends-on

  # ---------------------------------------------------------------------------
  # MINIO — S3-compatible object storage
  # ---------------------------------------------------------------------------
  minio:
    image: minio/minio:latest
    container_name: minio
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - multi-subsidary-net

  minio_mc_setup:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY}
    entrypoint:
      - /bin/sh
      - -c
      - |
        until mc alias set local http://minio:9000 $MINIO_ROOT_USER $MINIO_ROOT_PASSWORD; do
          echo "Waiting for MinIO..."
          sleep 3
        done
        mc admin user svcacct add local minio \
          --access-key $MINIO_ACCESS_KEY \
          --secret-key $MINIO_SECRET_KEY || echo "Service account may already exist"
        echo "MinIO setup complete"
    restart: "no"
    networks:
      - multi-subsidary-net

  # ---------------------------------------------------------------------------
  # SUPERSET — internal metadata on postgres-central/superset
  #            queries gold layer via LAKEHOUSE_DATABASE_URL
  # ---------------------------------------------------------------------------
  superset:
    image: apache/superset:latest
    container_name: superset
    depends_on:
      postgres-central:
        condition: service_healthy
    environment:
      SUPERSET_SECRET_KEY: ${SUPERSET_SECRET_KEY}
      # Superset's own internal metadata DB
      DATABASE_URL: ${DATABASE_URL}
      # Lakehouse datasource (gold layer) — registered as a DB connection in UI
      LAKEHOUSE_DATABASE_URL: ${LAKEHOUSE_DATABASE_URL}
    ports:
      - "8088:8088"
    volumes:
      - ./superset:/app/pythonpath/superset
      - superset_data:/app/superset_home
    networks:
      - multi-subsidary-net

  # ---------------------------------------------------------------------------
  # DATAHUB — metadata on postgres-central/datahub
  # ---------------------------------------------------------------------------
  datahub-gms:
    image: linkedin/datahub-gms:v0.11.0
    container_name: datahub-gms
    ports:
      - "8085:8085"
    depends_on:
      postgres-central:
        condition: service_healthy
      datahub-kafka:
        condition: service_started
      datahub-zookeeper:
        condition: service_started
    environment:
      EBEAN_DATASOURCE_USERNAME: ${POSTGRES_CENTRAL_USER}
      EBEAN_DATASOURCE_PASSWORD: ${POSTGRES_CENTRAL_PASSWORD}
      EBEAN_DATASOURCE_HOST: postgres-central:5432
      EBEAN_DATASOURCE_URL: "jdbc:postgresql://postgres-central:5432/${DATAHUB_DB_NAME}"
      KAFKA_BOOTSTRAP_SERVER: datahub-kafka:9092
    networks:
      - multi-subsidary-net

  datahub-frontend:
    image: linkedin/datahub-frontend-react:v0.11.0
    container_name: datahub-frontend
    ports:
      - "9002:9002"
    depends_on:
      - datahub-gms
    networks:
      - multi-subsidary-net

  # ---------------------------------------------------------------------------
  # KAFKA + ZOOKEEPER
  # ---------------------------------------------------------------------------
  datahub-kafka:
    image: confluentinc/cp-kafka:7.4.0
    container_name: datahub-kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: datahub-zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://datahub-kafka:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    depends_on:
      - datahub-zookeeper
    networks:
      - multi-subsidary-net

  datahub-zookeeper:
    image: confluentinc/cp-zookeeper:7.4.0
    container_name: datahub-zookeeper
    ports:
      - "2181:2181"
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
      ALLOW_ANONYMOUS_LOGIN: "yes"
    networks:
      - multi-subsidary-net

  # ---------------------------------------------------------------------------
  # KAFKA CONNECT (DEBEZIUM)
  # Reads WAL from postgres-DEPT → lakehouse-net
  # Publishes CDC events to Kafka → multi-subsidary-net
  # Must be on BOTH networks
  # ---------------------------------------------------------------------------
  kafka-connect:
    image: debezium/connect:2.2
    container_name: kafka-connect
    depends_on:
      datahub-kafka:
        condition: service_started
      postgres-dept:
        condition: service_healthy
    environment:
      BOOTSTRAP_SERVERS: datahub-kafka:9092
      GROUP_ID: 1
      CONFIG_STORAGE_TOPIC: connect-configs
      OFFSET_STORAGE_TOPIC: connect-offsets
      STATUS_STORAGE_TOPIC: connect-status
      KEY_CONVERTER: org.apache.kafka.connect.json.JsonConverter
      VALUE_CONVERTER: org.apache.kafka.connect.json.JsonConverter
      KEY_CONVERTER_SCHEMAS_ENABLE: "false"
      VALUE_CONVERTER_SCHEMAS_ENABLE: "false"
      PLUGIN_PATH: /kafka/connect
    ports:
      - "8083:8083"
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8083/connectors"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - lakehouse-net # reads postgres-dept WAL
      - multi-subsidary-net # publishes to datahub-kafka

  debezium-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: debezium-ui
    depends_on:
      - kafka-connect
      - datahub-kafka
    environment:
      KAFKA_CLUSTERS_0_NAME: lakehouse
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: datahub-kafka:9092
      KAFKA_CLUSTERS_0_KAFKACONNECT_0_NAME: debezium
      KAFKA_CLUSTERS_0_KAFKACONNECT_0_ADDRESS: http://kafka-connect:8083
    ports:
      - "8084:8080"
    networks:
      - multi-subsidary-net

  # ---------------------------------------------------------------------------
  # CDC CONSUMER
  # Consumes Kafka topics → writes bronze.* on postgres-central/lakehouse
  # Fixed: hostname, env var name, correct DB user
  # ---------------------------------------------------------------------------
  cdc-consumer:
    build:
      context: ./services/cdc_consumer
    container_name: cdc-consumer
    depends_on:
      datahub-kafka:
        condition: service_started
      postgres-central:
        condition: service_healthy
    environment:
      KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_BOOTSTRAP_SERVERS}
      LAKEHOUSE_POSTGRES_DSN: ${LAKEHOUSE_POSTGRES_DSN}
    volumes:
      - ./services/cdc_consumer:/app
    restart: unless-stopped
    networks:
      - multi-subsidary-net

  # ---------------------------------------------------------------------------
  # FLOWER (optional — enable with --profile flower)
  # ---------------------------------------------------------------------------
  flower:
    <<: *airflow-common
    command: celery flower
    profiles:
      - flower
    ports:
      - "5555:5555"
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:5555/"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: always
    depends_on:
      <<: *airflow-common-depends-on
      airflow-init:
        condition: service_completed_successfully

# =============================================================================
volumes:
  postgres-dept-volume:
  postgres-central-volume:
  superset_data:
  minio_data:

networks:
  # Dept OLTP layer — postgres-dept + dept services + kafka-connect
  lakehouse-net:
    driver: bridge

  # Platform layer — postgres-central + all analytics/orchestration services
  multi-subsidary-net:
    driver: bridge
